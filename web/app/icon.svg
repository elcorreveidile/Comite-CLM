<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo azul UGR con esquinas redondeadas -->
  <rect width="100" height="100" rx="20" fill="#003087"/>
  <!-- Franja roja superior (CCOO/UGT) -->
  <rect x="0" y="0" width="100" height="9" rx="4" fill="#E2001A"/>
  <rect x="0" y="4" width="100" height="5" fill="#E2001A"/>
  <!-- Letras CE: Comité de Empresa -->
  <text x="50" y="63"
    text-anchor="middle"
    fill="white"
    font-size="48"
    font-family="Arial Black, Arial, Helvetica, sans-serif"
    font-weight="900"
    letter-spacing="-2">CE</text>
  <!-- CLM pequeño debajo -->
  <text x="50" y="83"
    text-anchor="middle"
    fill="rgba(255,255,255,0.55)"
    font-size="13"
    font-family="Arial, Helvetica, sans-serif"
    font-weight="bold"
    letter-spacing="4">CLM</text>
</svg>
